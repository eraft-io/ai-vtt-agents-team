<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI VTT Agents Team</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- ============== Left: Config Panel ============== -->
    <aside class="config-panel">
      <h1 class="logo">AI VTT</h1>
      <p class="subtitle">多 Agent 视频转录翻译系统</p>

      <div class="config-scroll">
        <!-- Model Config -->
        <section class="config-section">
          <h2>模型配置</h2>
          <label>API Key
            <input type="password" id="cfg-api-key" placeholder="sk-xxxxxxxx">
          </label>
          <label>模型名称
            <input type="text" id="cfg-model-name" placeholder="qwen3.6-plus">
          </label>
          <label>Base URL
            <input type="text" id="cfg-base-url" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">
          </label>
        </section>

        <!-- Transcriber -->
        <section class="config-section">
          <h2>转录 Agent</h2>
          <label>Whisper 模型
            <select id="cfg-whisper-model">
              <option value="tiny">tiny (最快)</option>
              <option value="base">base</option>
              <option value="small" selected>small</option>
              <option value="medium">medium (推荐)</option>
              <option value="large">large (最精确)</option>
            </select>
          </label>
        </section>

        <!-- Keyframe Extractor -->
        <section class="config-section">
          <h2>关键帧提取</h2>
          <label>场景阈值
            <input type="number" id="cfg-scene-threshold" step="0.01" min="0" max="1" value="0.08">
          </label>
          <label>最小间隔 (秒)
            <input type="number" id="cfg-min-interval" step="1" min="1" value="5">
          </label>
        </section>

        <!-- Video Preprocessing -->
        <section class="config-section">
          <h2>视频分段</h2>
          <label>分段触发阈值 (分钟)
            <input type="number" id="cfg-max-duration" step="1" min="1" value="30">
          </label>
          <label>每段时长 (分钟)
            <input type="number" id="cfg-segment-duration" step="1" min="1" value="10">
          </label>
        </section>

        <button id="btn-save-config" class="btn btn-primary">保存配置</button>
        <div id="config-status" class="config-status"></div>
      </div>
    </aside>

    <!-- ============== Right: Chat Panel ============== -->
    <main class="chat-panel">
      <!-- Mode toggle -->
      <div class="mode-bar">
        <button id="btn-mode-single" class="mode-btn active">单视频</button>
        <button id="btn-mode-batch" class="mode-btn">批量并发</button>
      </div>

      <!-- Single mode input -->
      <div id="input-single" class="chat-input-bar">
        <input type="text" id="input-prompt" class="input-prompt" placeholder="帮我把桌面上的 demo.mp4 翻译成中文文章">
        <button id="btn-start" class="btn btn-accent">发送</button>
      </div>

      <!-- Batch mode input -->
      <div id="input-batch" class="chat-input-bar batch-bar" style="display:none;">
        <div class="batch-input-group">
          <div class="batch-dir-row">
            <label class="batch-option-label" style="flex:1">视频目录（输入目录路径，自动扫描其中的视频文件）
              <input type="text" id="input-batch-dir" class="input-prompt" placeholder="/Users/me/Desktop/videos 或 ~/Desktop/lectures">
            </label>
          </div>
          <div class="batch-options">
            <label class="batch-option-label">目标语言
              <input type="text" id="batch-language" class="batch-option-input" value="中文" placeholder="中文">
            </label>
            <label class="batch-option-label">并发数
              <input type="number" id="batch-concurrency" class="batch-option-input" value="3" min="1" max="10">
            </label>
            <button id="btn-batch-start" class="btn btn-accent">开始批量处理</button>
          </div>
        </div>

        <!-- 批次历史 -->
        <div id="batch-history" class="batch-history">
          <div class="batch-history-header">
            <h3>历史批次</h3>
            <button id="btn-refresh-batches" class="btn btn-sm">刷新</button>
          </div>
          <div id="batch-history-list" class="batch-history-list"></div>
        </div>
      </div>

      <!-- Progress bar -->
      <div id="progress-bar" class="progress-bar" style="display:none;">
        <div class="progress-info">
          <span id="progress-label">处理中...</span>
          <span id="progress-count">0/0</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Message stream -->
      <div id="chat-messages" class="chat-messages"></div>

      <!-- Result area -->
      <div id="result-area" class="result-area" style="display:none;">
        <div class="result-header">
          <h3>最终文章</h3>
          <div class="result-actions">
            <button id="btn-download-result" class="btn btn-sm">下载 .md</button>
            <button id="btn-copy-result" class="btn btn-sm">复制</button>
          </div>
        </div>
        <div id="result-content" class="result-content"></div>
      </div>
    </main>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
